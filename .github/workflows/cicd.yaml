name: CI — Admin Vendor Service

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: haze21/admin-vendor-service
  HELM_REPO: haze-me/k8s-helm-charts          # Change to your actual helm repo name
  HELM_VALUES_PATH: charts/admin-vendor/values.yaml

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Only update Helm chart on main branch pushes (not PRs)
      - name: Update Helm chart image tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          HELM_REPO_TOKEN: ${{ secrets.HELM_REPO_TOKEN }}
          TAG: ${{ steps.meta.outputs.TAG }}
        run: |
          # Clone the helm charts repo
          git clone https://x-access-token:${HELM_REPO_TOKEN}@github.com/${{ env.HELM_REPO }}.git helm-repo
          cd helm-repo

          # Update the image tag in values.yaml using sed
          sed -i "s/tag: .*/tag: \"${TAG}\"/" ${{ env.HELM_VALUES_PATH }}

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.HELM_VALUES_PATH }}
          git commit -m "cicd: update admin-vendor image tag to ${TAG} [skip cicd]"
          git push